<!DOCTYPE html>
<html>

<head>
    <title>UK Global Talent Visa Assistant</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>

    <div class="app-container">

        <div class="header">
            🇬🇧 UK Global Talent Visa Assistant
        </div>

        <div class="avatar-container">
            <lottie-player
                id="avatar"
                src="idle.json"
                background="transparent"
                speed="1"
                style="width: 120px; height: 120px;"
                loop
                autoplay>
            </lottie-player>
        </div>

        <div id="chat-box"></div>

        <div id="status-indicator"></div>
        <div class="input-container">

            <input type="text" id="message-input" placeholder="Ask your question..."
                onkeypress="handleKeyPress(event)" />

            <button onclick="toggleTTS()" id="tts-btn" class="tts-btn">
                🔊
            </button>

            <button onclick="startVoiceInput()" class="mic-btn">
                🎤
            </button>

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
